<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuranTime</title>
  <!-- config.js sets window.API_BASE to the Railway URL on Hostinger -->
  <script src="config.js" onerror="void 0"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:wght@300;400;500&family=Lora:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Themes ──────────────────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:           #08080E;
      --gold:         #C49B48;
      --gold-dim:     rgba(196, 155, 72, 0.55);
      --gold-tint:    rgba(196, 155, 72, 0.1);
      --glass:        rgba(255, 255, 255, 0.038);
      --glass-b:      rgba(255, 255, 255, 0.07);
      --text:         #EDE8DF;
      --muted:        #7A7268;
      --soft:         rgba(237, 232, 223, 0.65);
      --divider:      rgba(255, 255, 255, 0.06);
      --header-grad:  rgba(8, 8, 14, 0.97), rgba(8, 8, 14, 0.92), rgba(8, 8, 14, 0);
      --tb-bg:        rgba(22, 20, 16, 0.92);
      --tb-border:    rgba(255, 255, 255, 0.1);
      --tb-btn:       rgba(255, 255, 255, 0.06);
      --tb-btn-hover: rgba(255, 255, 255, 0.12);
      --bg-glow1:     rgba(196, 155, 72, 0.13);
      --bg-glow2:     rgba(196, 155, 72, 0.05);
    }

    [data-theme="light"] {
      --bg:           #F5EFE4;
      --gold:         #9A7530;
      --gold-dim:     rgba(154, 117, 48, 0.6);
      --gold-tint:    rgba(154, 117, 48, 0.1);
      --glass:        rgba(255, 255, 255, 0.55);
      --glass-b:      rgba(0, 0, 0, 0.07);
      --text:         #1C1810;
      --muted:        #8A7D6A;
      --soft:         rgba(28, 24, 16, 0.7);
      --divider:      rgba(0, 0, 0, 0.07);
      --header-grad:  rgba(245, 239, 228, 0.98), rgba(245, 239, 228, 0.92), rgba(245, 239, 228, 0);
      --tb-bg:        rgba(255, 252, 246, 0.94);
      --tb-border:    rgba(0, 0, 0, 0.1);
      --tb-btn:       rgba(0, 0, 0, 0.05);
      --tb-btn-hover: rgba(0, 0, 0, 0.1);
      --bg-glow1:     rgba(196, 155, 72, 0.08);
      --bg-glow2:     rgba(196, 155, 72, 0.04);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 45% at 50% 0%, var(--bg-glow1) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 50% 100%, var(--bg-glow2) 0%, transparent 60%);
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c49b48' fill-opacity='0.025'%3E%3Cpath d='M30 0 L36 12 L30 10 L24 12 Z M30 60 L36 48 L30 50 L24 48 Z M0 30 L12 36 L10 30 L12 24 Z M60 30 L48 36 L50 30 L48 24 Z M30 20 L40 30 L30 40 L20 30 Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── Sticky clock header ─────────────────────────────────────── */
    .clock-header {
      position: sticky;
      top: 0;
      z-index: 20;
      text-align: center;
      padding: 2.8rem 1.25rem 1.8rem;
      background: linear-gradient(to bottom,
        var(--header-grad)
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: padding 0.3s ease;
    }

    .clock-header.scrolled { padding: 1.2rem 1.25rem 1.4rem; }

    .time {
      font-family: 'Lora', serif;
      font-size: clamp(5.5rem, 18vw, 10rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      background: linear-gradient(160deg, #F5ECD5 30%, #C49B48 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(196, 155, 72, 0.3));
      transition: font-size 0.3s ease;
    }

    [data-theme="light"] .time {
      background: linear-gradient(160deg, #6B4F1A 20%, #C49B48 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .clock-header.scrolled .time { font-size: clamp(2.8rem, 8vw, 4rem); }

    .time .colon {
      -webkit-text-fill-color: var(--gold);
      animation: blink 1s step-start infinite;
    }

    @keyframes blink { 50% { opacity: 0.15; } }

    .ref-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }

    .engage-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.32rem 0.5rem 0.32rem 0.85rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    [data-theme="light"] .engage-badge {
      background: rgba(154,117,48,0.1);
      border: 1px solid rgba(154,117,48,0.3);
      color: rgba(100, 74, 20, 0.75);
    }

    .engage-badge.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .resume-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.22rem 0.7rem;
      background: rgba(196,155,72,0.15);
      border: 1px solid rgba(196,155,72,0.35);
      border-radius: 100px;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--gold);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }

    .resume-btn:hover {
      background: rgba(196,155,72,0.25);
      border-color: rgba(196,155,72,0.6);
    }

    [data-theme="light"] .resume-btn {
      background: rgba(154,117,48,0.12);
      border-color: rgba(154,117,48,0.4);
      color: #7A5C1A;
    }

    [data-theme="light"] .resume-btn svg {
      fill: #7A5C1A;
    }

    [data-theme="light"] .resume-btn:hover {
      background: rgba(154,117,48,0.22);
      border-color: rgba(154,117,48,0.65);
    }

    .resume-btn svg {
      width: 10px;
      height: 10px;
      fill: var(--gold);
    }

    .engage-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(196,155,72,0.8);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .reference {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.38rem 1rem;
      background: var(--gold-tint);
      border: 1px solid rgba(196, 155, 72, 0.25);
      border-radius: 100px;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--gold);
    }

    /* ── Main ────────────────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.25rem 8rem;
      gap: 1rem;
    }

    /* ── Card ─────────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.04) inset,
        0 32px 64px rgba(0,0,0,0.35),
        0 0 80px rgba(196, 155, 72, 0.04);
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    /* ── Staggered fade-up on load ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card .surah-bar            { animation: fadeUp 0.4s ease both; animation-delay: 0.05s; }
    .card .ayah-arabic          { animation: fadeUp 0.4s ease both; animation-delay: 0.12s; }
    .card .ayah-transliteration { animation: fadeUp 0.4s ease both; animation-delay: 0.19s; }
    .card .ayah-translation     { animation: fadeUp 0.4s ease both; animation-delay: 0.26s; }
    .card .tafsir               { animation: fadeUp 0.4s ease both; animation-delay: 0.34s; }

    /* ── Surah header ─────────────────────────────────────────────── */
    .surah-bar {
      padding: 1.4rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--divider);
      background: var(--gold-tint);
    }

    .surah-en { font-size: 1.05rem; font-weight: 500; color: var(--text); letter-spacing: 0.01em; }
    .surah-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.02em; }

    .surah-ar {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 20px rgba(196, 155, 72, 0.3);
    }

    /* ── Audio player ─────────────────────────────────────────────── */
    .ayah-arabic-wrap {
      position: relative;
      border-bottom: 1px solid var(--divider);
    }

    .ayah-arabic {
      padding: 2.2rem 1.8rem 1.8rem;
      font-family: 'Amiri', serif;
      font-size: calc(1.8rem * var(--fs, 1));
      line-height: 2.2;
      text-align: right;
      direction: rtl;
      color: var(--text);
    }

    .play-btn {
      position: absolute;
      bottom: 1.1rem;
      left: 1.4rem;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 50%;
      border: 1.5px solid rgba(196,155,72,0.35);
      background: var(--gold-tint);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      background: rgba(196,155,72,0.18);
      border-color: rgba(196,155,72,0.65);
      transform: scale(1.07);
    }

    .play-btn svg { width: 1rem; height: 1rem; fill: var(--gold); }

    /* pulse ring while playing */
    .play-btn.playing {
      border-color: var(--gold);
      background: rgba(196,155,72,0.15);
    }

    .play-btn.playing::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid rgba(196,155,72,0.4);
      animation: audioRing 1.4s ease-out infinite;
    }

    @keyframes audioRing {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(1.6); opacity: 0;   }
    }

    /* spinner while loading */
    .play-btn.loading svg { display: none; }
    .play-btn.loading::before {
      content: '';
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(196,155,72,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* audio progress bar */
    .audio-progress {
      height: 2px;
      background: var(--divider);
      overflow: hidden;
    }

    .audio-progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold-dim), var(--gold));
      width: 0%;
      transition: width 0.5s linear;
    }

    .ayah-transliteration {
      padding: 1rem 1.8rem;
      font-size: calc(0.85rem * var(--fs, 1));
      line-height: 1.9;
      color: var(--muted);
      letter-spacing: 0.025em;
      font-style: italic;
      border-bottom: 1px solid var(--divider);
    }

    .ayah-translation {
      padding: 1.2rem 1.8rem 1.4rem;
      font-size: calc(0.95rem * var(--fs, 1));
      line-height: 1.85;
      color: var(--soft);
      border-bottom: 1px solid var(--divider);
    }

    /* ── Section label ────────────────────────────────────────────── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
      margin-bottom: 1rem;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 16px;
      height: 1px;
      background: var(--gold-dim);
    }

    /* ── Tafsir ───────────────────────────────────────────────────── */
    .tafsir { padding: 1.6rem 1.8rem 2rem; }

    .tafsir-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 0.65rem;
    }

    .tafsir-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.18rem 0.55rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .tafsir-badge.ai {
      background: rgba(99,179,124,0.13);
      border: 1px solid rgba(99,179,124,0.25);
      color: #63b37c;
    }

    .tafsir-badge.fallback {
      background: rgba(196,155,72,0.1);
      border: 1px solid rgba(196,155,72,0.2);
      color: var(--gold);
    }

    .tafsir-badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: none;
    }

    .tafsir-badge.ai .dot {
      animation: pulse-dot 1.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .tafsir-badge.ai.done .dot { animation: none; }

    .tafsir-cursor {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: var(--gold);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .tafsir-text {
      font-size: calc(0.95rem * var(--fs, 1));
      line-height: 1.9;
      color: var(--muted);
    }

    /* ── Structured AI tafsir sections ───────────────────────────── */
    .tafsir-section-label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin: 1.1rem 0 0.55rem;
    }

    .tafsir-section-label:first-child { margin-top: 0; }

    .tafsir-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--divider);
    }

    .tafsir-meaning {
      font-size: calc(0.95rem * var(--fs, 1));
      line-height: 1.85;
      color: var(--text);
      opacity: 0.85;
    }

    .tafsir-takeaways {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-top: 0.1rem;
    }

    .tafsir-takeaway-item {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      font-size: calc(0.9rem * var(--fs, 1));
      line-height: 1.6;
      color: var(--soft);
    }

    .tafsir-takeaway-item::before {
      content: '';
      flex-shrink: 0;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      margin-top: 0.52em;
      opacity: 0.7;
    }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400% 0; }
      100% { background-position:  400% 0; }
    }

    .skel {
      border-radius: 6px;
      background: linear-gradient(
        90deg,
        rgba(128,110,80,0.07) 25%,
        rgba(128,110,80,0.14) 50%,
        rgba(128,110,80,0.07) 75%
      );
      background-size: 400% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
    }

    .skel-bar {
      padding: 1.4rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--divider);
      background: var(--gold-tint);
    }

    .skel-bar-left { display: flex; flex-direction: column; gap: 0.5rem; }

    .skel-arabic-block {
      padding: 2.2rem 1.8rem 1.8rem;
      border-bottom: 1px solid var(--divider);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1rem;
    }

    .skel-rows {
      padding: 1.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      border-bottom: 1px solid var(--divider);
    }

    .skel-tafsir { padding: 1.6rem 1.8rem 2rem; display: flex; flex-direction: column; gap: 0.6rem; }

    .h-10  { height: 10px; } .h-12 { height: 12px; } .h-14 { height: 14px; }
    .h-24  { height: 24px; } .h-10 { height: 10px; }
    .w-20  { width: 20%; }   .w-30 { width: 30%; }   .w-40 { width: 40%; }
    .w-50  { width: 50%; }   .w-60 { width: 60%; }   .w-70 { width: 70%; }
    .w-80  { width: 80%; }   .w-90 { width: 90%; }   .w-full { width: 100%; }
    .r-8   { border-radius: 8px; }

    /* ── Floating toolbar ─────────────────────────────────────────── */
    .toolbar {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: var(--tb-bg);
      border: 1px solid var(--tb-border);
      border-radius: 100px;
      padding: 0.45rem 0.6rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .tb-divider {
      width: 1px;
      height: 18px;
      background: var(--tb-border);
      margin: 0 0.3rem;
    }

    .tb-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 100px;
      border: none;
      background: var(--tb-btn);
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.82rem;
      letter-spacing: 0.01em;
      transition: background 0.15s ease, transform 0.1s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tb-btn:hover  { background: var(--tb-btn-hover); }
    .tb-btn:active { transform: scale(0.92); }
    .tb-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    .tb-btn svg { width: 17px; height: 17px; stroke: var(--text); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

    /* font size label in toolbar */
    .tb-label {
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0 0.4rem;
      min-width: 28px;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.04em;
    }

    /* ── Misc ─────────────────────────────────────────────────────── */
    .wrap-note {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
      max-width: 640px;
      width: 100%;
    }

    .state {
      padding: 3.5rem;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .clock-header { padding: 2.2rem 1rem 1.4rem; }
      .clock-header.scrolled { padding: 1rem 1rem 1.2rem; }
      main { padding: 0 1rem 8rem; }
      .surah-bar { flex-direction: column; align-items: flex-start; padding: 1.2rem 1.4rem; }
      .surah-ar { align-self: flex-end; }
      .ayah-arabic, .ayah-transliteration, .ayah-translation, .tafsir { padding-left: 1.4rem; padding-right: 1.4rem; }
    }
  </style>
</head>
<body>

  <header class="clock-header" id="clockHeader">
    <div class="time" id="timeDisplay">--<span class="colon">:</span>--</div>
    <div class="ref-row">
      <div class="reference" id="reference">Loading…</div>
      <div class="engage-badge" id="engageBadge">
        <span class="engage-dot"></span> Reading
        <button class="resume-btn" onclick="resumeLive()">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          Resume
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="card" id="card"></div>
    <div class="wrap-note" id="wrapNote"></div>
  </main>

  <!-- Floating toolbar -->
  <div class="toolbar" role="toolbar" aria-label="Display settings">
    <button class="tb-btn" id="fontDown" title="Decrease font size" aria-label="Decrease font size">
      <svg viewBox="0 0 24 24"><text x="4" y="17" font-size="13" font-family="serif" fill="currentColor" stroke="none">A</text></svg>
    </button>
    <span class="tb-label" id="fontLabel">100%</span>
    <button class="tb-btn" id="fontUp" title="Increase font size" aria-label="Increase font size">
      <svg viewBox="0 0 24 24"><text x="2" y="18" font-size="17" font-family="serif" fill="currentColor" stroke="none">A</text></svg>
    </button>
    <div class="tb-divider"></div>
    <button class="tb-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark mode">
      <!-- icon swapped by JS -->
    </button>
  </div>

<script>
  // In production (Hostinger), window.API_BASE is set by config.js to the Railway URL.
  // In local dev it falls back to '' (same origin — served by server.js).
  const API_BASE  = (typeof window !== 'undefined' && window.API_BASE) ? window.API_BASE.replace(/\/$/, '') : '';
  const QURAN_API = 'https://api.alquran.cloud/v1';
  let lastKey = null;

  /* ── Mawdudi fallback tafsir ────────────────────────────────────── */
  async function loadMawdudiTafsir(surah, ayah) {
    const badge = document.getElementById('tafsirBadge');
    const textEl = document.getElementById('tafsirText');
    if (!badge || !textEl) return;

    badge.className = 'tafsir-badge fallback';
    badge.innerHTML = '<span class="dot"></span> Mawdudi';

    try {
      const tf = await fetchJSON(`${QURAN_API}/ayah/${surah}:${ayah}/en.maududi`);
      textEl.textContent = tf.text || 'No tafsir available.';
    } catch {
      textEl.textContent = 'Tafsir unavailable.';
    }
  }

  /* ── Font size ─────────────────────────────────────────────────── */
  const FS_STEPS = [0.85, 0.92, 1.0, 1.1, 1.2, 1.3];
  let fsIndex = parseInt(localStorage.getItem('qt-fs') ?? '2', 10);

  function applyFontSize() {
    const scale = FS_STEPS[fsIndex];
    document.documentElement.style.setProperty('--fs', scale);
    document.getElementById('fontLabel').textContent = Math.round(scale * 100) + '%';
    document.getElementById('fontDown').disabled = fsIndex === 0;
    document.getElementById('fontUp').disabled   = fsIndex === FS_STEPS.length - 1;
    localStorage.setItem('qt-fs', fsIndex);
  }

  document.getElementById('fontDown').addEventListener('click', () => {
    if (fsIndex > 0) { fsIndex--; applyFontSize(); }
  });

  document.getElementById('fontUp').addEventListener('click', () => {
    if (fsIndex < FS_STEPS.length - 1) { fsIndex++; applyFontSize(); }
  });

  /* ── Theme ─────────────────────────────────────────────────────── */
  const MOON_SVG = `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>`;
  const SUN_SVG  = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

  let theme = localStorage.getItem('qt-theme') ?? 'dark';

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeToggle').innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
    localStorage.setItem('qt-theme', theme);
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    applyTheme();
  });

  /* ── Scroll shrink ─────────────────────────────────────────────── */
  const header = document.getElementById('clockHeader');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });

  /* ── API ───────────────────────────────────────────────────────── */
  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    if (j.code !== 200) throw new Error(j.status || 'API error');
    return j.data;
  }

  /* ── Ollama AI Tafsir (streaming via server proxy) ─────────────── */
  async function ollamaAvailable() {
    try {
      const r = await fetch(`${API_BASE}/api/ai-status`, { signal: AbortSignal.timeout(2000) });
      return r.ok;
    } catch { return false; }
  }

  // Parse structured AI response into HTML sections
  function renderStructuredTafsir(raw, streaming = false) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const cursor = streaming ? '<span class="tafsir-cursor"></span>' : '';

    const meaningMatch  = raw.match(/MEANING\s*([\s\S]*?)(?=TAKEAWAYS|$)/i);
    const takeawayMatch = raw.match(/TAKEAWAYS\s*([\s\S]*?)$/i);

    const meaningText = meaningMatch ? meaningMatch[1].trim() : '';
    const takeawayRaw = takeawayMatch ? takeawayMatch[1].trim() : '';

    // If we haven't hit TAKEAWAYS yet, show meaning as plain streaming text
    if (!takeawayMatch && !meaningMatch) {
      return `<span class="tafsir-meaning">${esc(raw)}${cursor}</span>`;
    }

    let html = '';

    if (meaningText) {
      html += `<div class="tafsir-section-label">Meaning</div>`;
      html += `<div class="tafsir-meaning">${esc(meaningText)}</div>`;
    }

    if (takeawayRaw) {
      const lines = takeawayRaw.split('\n')
        .map(l => l.trim())
        .filter(l => l.startsWith('-') || l.startsWith('•') || l.match(/^\d+\./));

      if (lines.length > 0) {
        html += `<div class="tafsir-section-label">Today's Takeaways</div>`;
        html += `<div class="tafsir-takeaways">`;
        lines.forEach((l, i) => {
          const text = l.replace(/^[-•]|\d+\./, '').trim();
          const isLast = i === lines.length - 1;
          html += `<div class="tafsir-takeaway-item">${esc(text)}${isLast && streaming ? cursor : ''}</div>`;
        });
        html += `</div>`;
      } else if (streaming) {
        // Takeaways section started but no bullet lines yet
        html += `<div class="tafsir-section-label">Today's Takeaways</div>`;
        html += `<div class="tafsir-meaning">${esc(takeawayRaw)}${cursor}</div>`;
      }
    } else if (streaming && meaningText) {
      // Still writing meaning
      html = `<div class="tafsir-section-label">Meaning</div>`;
      html += `<div class="tafsir-meaning">${esc(meaningText)}${cursor}</div>`;
    }

    return html;
  }

  async function streamAITafsir(surahName, surahNum, ayahNum, arabicText, translation) {
    const res = await fetch(`${API_BASE}/api/tafsir`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ surahName, surahNum, ayahNum, arabicText, translation }),
    });

    if (!res.ok) throw new Error(`Ollama ${res.status}`);

    const tafsirTextEl = document.getElementById('tafsirText');
    const tafsirBadge  = document.getElementById('tafsirBadge');
    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value, { stream: true }).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') {
          tafsirTextEl.innerHTML = renderStructuredTafsir(buf, false);
          tafsirBadge.classList.add('done');
          break;
        }
        try {
          const obj = JSON.parse(payload);
          if (obj.text) {
            buf += obj.text;
            tafsirTextEl.innerHTML = renderStructuredTafsir(buf, true);
          }
        } catch { /* partial chunk */ }
      }
    }
  }

  /* ── Interaction pause ───────────────────────────────────────────── */
  let userEngaged = false;
  let idleTimer   = null;
  const IDLE_MS   = 90_000; // resume 90s after user leaves card

  function engage() {
    userEngaged = true;
    clearTimeout(idleTimer);
    const badge = document.getElementById('engageBadge');
    if (badge) badge.classList.add('visible');
  }

  function disengage() {
    clearTimeout(idleTimer);
    // Stay engaged while audio is playing
    if (currentAudio && !currentAudio.paused) return;
    idleTimer = setTimeout(resumeLive, IDLE_MS);
  }

  function resumeLive() {
    clearTimeout(idleTimer);
    userEngaged = false;
    const badge = document.getElementById('engageBadge');
    if (badge) badge.classList.remove('visible');
    // Catch up on any missed verse change
    lastKey = null;
    tick();
  }

  // Attach once — any interaction anywhere on the page triggers engage
  function initEngageListeners() {
    ['pointerdown', 'touchstart', 'scroll', 'keydown'].forEach(evt =>
      document.addEventListener(evt, engage, { passive: true })
    );
  }

  function attachCardListeners() { /* kept for call-site compat, now a no-op */ }

  /* ── Audio playback ─────────────────────────────────────────────── */
  let currentAudio   = null;
  let progressTimer  = null;

  function stopAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    clearInterval(progressTimer);
    const btn  = document.getElementById('playBtn');
    const prog = document.getElementById('audioProgress');
    const fill = document.getElementById('audioFill');
    if (btn)  { btn.classList.remove('playing', 'loading'); btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>'; }
    if (prog) prog.style.display = 'none';
    if (fill) fill.style.width = '0%';
  }

  function toggleAudio(surahNum, ayahNum) {
    const btn = document.getElementById('playBtn');

    // If already playing this verse — pause it
    if (currentAudio && !currentAudio.paused) {
      stopAudio();
      return;
    }

    // Build EveryAyah URL (Mishary Al-Afasy 128kbps)
    const s = String(surahNum).padStart(3, '0');
    const a = String(ayahNum).padStart(3, '0');
    const url = `https://everyayah.com/data/Alafasy_128kbps/${s}${a}.mp3`;

    // Loading state
    btn.classList.add('loading');
    btn.classList.remove('playing');

    currentAudio = new Audio(url);
    currentAudio.preload = 'auto';

    currentAudio.addEventListener('canplay', () => {
      btn.classList.remove('loading');
      btn.classList.add('playing');
      btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
      const prog = document.getElementById('audioProgress');
      if (prog) prog.style.display = 'block';
      currentAudio.play();

      // Progress bar
      progressTimer = setInterval(() => {
        const fill = document.getElementById('audioFill');
        if (fill && currentAudio && currentAudio.duration) {
          fill.style.width = `${(currentAudio.currentTime / currentAudio.duration) * 100}%`;
        }
      }, 500);
    });

    currentAudio.addEventListener('ended', () => { stopAudio(); disengage(); });
    currentAudio.addEventListener('error', () => { stopAudio(); disengage(); });
  }

  function tick() {
    const now = new Date();
    const H = now.getHours();
    const M = now.getMinutes();
    const hh = String(H).padStart(2, '0');
    const mm = String(M).padStart(2, '0');

    // Only update the clock display when not reading
    if (!userEngaged) {
      document.getElementById('timeDisplay').innerHTML =
        `${hh}<span class="colon">:</span>${mm}`;
    }

    const surah = H === 0 ? 1 : H;
    const key = `${surah}:${mm}`;
    if (key === lastKey) return;
    if (userEngaged) return; // freeze — user is reading
    lastKey = key;

    document.getElementById('reference').innerHTML =
      `Surah ${surah} &nbsp;·&nbsp; Ayah ${M || 1}`;

    loadVerse(surah, M || 1);
  }

  async function loadVerse(surah, ayah) {
    document.getElementById('card').innerHTML = skeletonHTML();
    document.getElementById('wrapNote').textContent = '';
    attachCardListeners();

    try {
      const surahInfo = await fetchJSON(`${QURAN_API}/surah/${surah}`);
      const totalAyahs = surahInfo.numberOfAyahs;

      let actualAyah = ayah;
      let wrapped = false;
      if (ayah > totalAyahs) {
        actualAyah = ((ayah - 1) % totalAyahs) + 1;
        wrapped = true;
      }

      const [arabic, translit, trans] = await Promise.allSettled([
        fetchJSON(`${QURAN_API}/ayah/${surah}:${actualAyah}`),
        fetchJSON(`${QURAN_API}/ayah/${surah}:${actualAyah}/en.transliteration`),
        fetchJSON(`${QURAN_API}/ayah/${surah}:${actualAyah}/en.sahih`),
      ]);

      const ar = arabic.status   === 'fulfilled' ? arabic.value   : null;
      const tl = translit.status === 'fulfilled' ? translit.value : null;
      const tr = trans.status    === 'fulfilled' ? trans.value    : null;

      if (!ar) throw new Error('Could not load verse');

      let html = `
        <div class="surah-bar">
          <div>
            <div class="surah-en">${surahInfo.englishName}</div>
            <div class="surah-sub">${surahInfo.englishNameTranslation} &nbsp;·&nbsp; ${totalAyahs} ayahs</div>
          </div>
          <div class="surah-ar">${surahInfo.name}</div>
        </div>
        <div class="ayah-arabic-wrap">
          <div class="ayah-arabic">${ar.text}</div>
          <button class="play-btn" id="playBtn" aria-label="Play recitation" onclick="toggleAudio(${surah}, ${actualAyah})">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <div class="audio-progress" id="audioProgress" style="display:none">
            <div class="audio-progress-fill" id="audioFill"></div>
          </div>
        </div>
      `;

      if (tl) html += `<div class="ayah-transliteration">${tl.text}</div>`;
      if (tr) html += `<div class="ayah-translation">${tr.text}</div>`;

      // Tafsir section — will be populated after render
      html += `
        <div class="tafsir">
          <div class="tafsir-header">
            <span class="section-label" style="margin-bottom:0">Tafsir</span>
            <span class="tafsir-badge ai" id="tafsirBadge">
              <span class="dot"></span> AI
            </span>
          </div>
          <div class="tafsir-text" id="tafsirText">
            <span class="tafsir-cursor"></span>
          </div>
        </div>`;

      document.getElementById('card').innerHTML = html;

      /* ── Load tafsir: try Ollama first, fall back to Mawdudi ─── */
      const useAI = await ollamaAvailable();

      if (useAI) {
        try {
          await streamAITafsir(
            surahInfo.englishName, surah, actualAyah,
            ar.text,
            tr ? tr.text : ''
          );
        } catch (e) {
          console.warn('Ollama stream failed, falling back:', e);
          await loadMawdudiTafsir(surah, actualAyah);
        }
      } else {
        await loadMawdudiTafsir(surah, actualAyah);
      }

      if (wrapped) {
        document.getElementById('wrapNote').textContent =
          `Surah ${surah} has ${totalAyahs} ayahs — showing ayah ${actualAyah}`;
      }

    } catch (err) {
      document.getElementById('card').innerHTML =
        `<div class="state" style="color:rgba(248,81,73,0.8)">Failed to load verse.<br><small>${err.message}</small></div>`;
    }
  }

  function skeletonHTML() {
    return `
      <div class="skel-bar">
        <div class="skel-bar-left">
          <div class="skel h-14 w-40"></div>
          <div class="skel h-10 w-60" style="margin-top:2px"></div>
        </div>
        <div class="skel h-24 w-20 r-8"></div>
      </div>
      <div class="skel-arabic-block">
        <div class="skel h-14 w-90"></div>
        <div class="skel h-14 w-70"></div>
        <div class="skel h-14 w-50"></div>
      </div>
      <div class="skel-rows">
        <div class="skel h-12 w-full"></div>
        <div class="skel h-12 w-80"></div>
      </div>
      <div class="skel-rows">
        <div class="skel h-12 w-full"></div>
        <div class="skel h-12 w-90"></div>
        <div class="skel h-12 w-60"></div>
      </div>
      <div class="skel-tafsir">
        <div class="skel h-10 w-30" style="margin-bottom:4px"></div>
        <div class="skel h-12 w-full"></div>
        <div class="skel h-12 w-full"></div>
        <div class="skel h-12 w-80"></div>
        <div class="skel h-12 w-90"></div>
        <div class="skel h-12 w-50"></div>
      </div>`;
  }

  // Init
  applyFontSize();
  applyTheme();
  initEngageListeners();
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
